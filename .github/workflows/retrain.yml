name: 🧠 Assistant ML Retraining + Dynamic Report    

on:
  # 1️⃣ Daily Scheduled Run (5:30 AM IST) 
  schedule:
    - cron: '0 0 * * *'

  # 2️⃣ Run When Code Is Pushed To Main
  push:
    branches:
      - main

  # 3️⃣ Manual Trigger From GitHub UI
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # 1️⃣ Checkout ML Repository
      # ==========================================
      - name: 📥 Checkout ML Repo
        uses: actions/checkout@v3

      # ==========================================
      # 2️⃣ Setup Python
      # ==========================================
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # ==========================================
      # 3️⃣ Install Dependencies
      # ==========================================
      - name: 📦 Install Dependencies
        run: |
          echo "Installing dependencies..."
          pip install -r requirements.txt
          echo "Dependencies installed successfully."

      # ==========================================
      # 4️⃣ Run Training & Capture Logs
      # ==========================================
      - name: 🚀 Train Model
        id: train_step
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "======================================"
          echo "🚀 STARTING ASSISTANT MODEL TRAINING"
          echo "======================================"

          python train.py | tee training_output.log

          echo "======================================"
          echo "✅ TRAINING COMPLETED"
          echo "======================================"

      # ==========================================
      # 5️⃣ Extract Training Metrics Dynamically
      # ==========================================
      - name: 📊 Extract Metrics
        id: metrics
        run: |
          ROWS=$(grep "Total training rows fetched" training_output.log | grep -o '[0-9]\+')
          ACCURACY=$(grep "Model Accuracy" training_output.log | awk '{print $4}')

          if [ -z "$ROWS" ]; then ROWS="N/A"; fi
          if [ -z "$ACCURACY" ]; then ACCURACY="N/A"; fi

          echo "rows=$ROWS" >> $GITHUB_OUTPUT
          echo "accuracy=$ACCURACY" >> $GITHUB_OUTPUT

      # ==========================================
      # 6️⃣ Check If Model File Exists
      # ==========================================
      - name: 🔎 Check Model File
        id: check_model
        run: |
          if [ -f "models/assistant_intent_model.pkl" ]; then
            echo "model_exists=true" >> $GITHUB_OUTPUT
            echo "Model file exists."
          else
            echo "model_exists=false" >> $GITHUB_OUTPUT
            echo "Model file NOT found."
          fi

      # ==========================================
      # 7️⃣ Push Model To Assistant Service
      # ==========================================
      - name: 📤 Push Model To Assistant Service
        if: steps.check_model.outputs.model_exists == 'true'
        env:
          TOKEN: ${{ secrets.ASSISTANT_REPO_TOKEN }}
          REPO: ${{ secrets.ASSISTANT_REPO_NAME }}
        run: |
          echo "Cloning assistant-service repository..."
          git clone https://x-access-token:${TOKEN}@github.com/${REPO}.git target_repo

          mkdir -p target_repo/models
          cp models/assistant_intent_model.pkl target_repo/models/

          cd target_repo
          git config user.name "ML Bot"
          git config user.email "ml-bot@example.com"

          git add models/assistant_intent_model.pkl
          git commit -m "🔄 Daily model update"
          git push

          echo "Model pushed successfully."

      # ==========================================
      # 8️⃣ Generate Date (DD-MM-YYYY)
      # ==========================================
      - name: 📅 Generate Date
        id: date_step
        run: |
          TODAY=$(date +"%d-%m-%Y")
          echo "today_date=$TODAY" >> $GITHUB_OUTPUT

      # ==========================================
      # 9️⃣ Send Final Email Report (Always Runs)
      # ==========================================
      - name: 📧 Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🧠 Assistant ML Report - ${{ steps.date_step.outputs.today_date }}"
          to: ${{ secrets.MAIL_TO }}
          cc: ${{ secrets.MAIL_CC }}
          from: Assistant ML Bot
          secure: true
          html_body: |
            <h2>🧠 Assistant ML Training Report</h2>

            <table border="1" cellpadding="8" cellspacing="0">
              <tr>
                <th align="left">Execution Date</th>
                <td>${{ steps.date_step.outputs.today_date }}</td>
              </tr>
              <tr>
                <th align="left">Training Rows</th>
                <td>${{ steps.metrics.outputs.rows }}</td>
              </tr>
              <tr>
                <th align="left">Model Accuracy</th>
                <td>${{ steps.metrics.outputs.accuracy }}</td>
              </tr>
              <tr>
                <th align="left">Model Saved</th>
                <td>${{ steps.check_model.outputs.model_exists }}</td>
              </tr>
              <tr>
                <th align="left">Workflow Status</th>
                <td>${{ job.status }}</td>
              </tr>
              <tr>
                <th align="left">Repository</th>
                <td>${{ github.repository }}</td>
              </tr>
            </table>

            <br>

            <p>
              🔎 View Full Logs:<br>
              <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                Open GitHub Actions Run
              </a>
            </p>

            <br>
            <p>🚀 Automated retraining pipeline executed.</p>
