name: 🧠 Daily Assistant Retraining + Email Report

on:
  schedule:
    - cron: '0 0 * * *'   # 5:30 AM IST
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # 1️⃣ Checkout Repository
      # ==========================================
      - name: 📥 Checkout ML Repo
        uses: actions/checkout@v3

      # ==========================================
      # 2️⃣ Setup Python
      # ==========================================
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # ==========================================
      # 3️⃣ Install Dependencies
      # ==========================================
      - name: 📦 Install Dependencies
        run: |
          echo "Installing dependencies..."
          pip install -r requirements.txt
          echo "Dependencies installed."

      # ==========================================
      # 4️⃣ Train Model
      # ==========================================
      - name: 🚀 Train Model
        id: train_step
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "======================================"
          echo "🚀 STARTING ASSISTANT MODEL TRAINING"
          echo "======================================"
          python train.py
          echo "======================================"
          echo "✅ TRAINING COMPLETED"
          echo "======================================"

      # ==========================================
      # 5️⃣ Check Model File
      # ==========================================
      - name: 🔍 Check Model File
        id: check_model
        run: |
          if [ -f "models/assistant_intent_model.pkl" ]; then
            echo "model_exists=true" >> $GITHUB_OUTPUT
            echo "Model file exists."
          else
            echo "model_exists=false" >> $GITHUB_OUTPUT
            echo "Model file NOT found."
          fi

      # ==========================================
      # 6️⃣ Push Model To Assistant Service
      # ==========================================
      - name: 📤 Push Model To Assistant Service
        if: steps.check_model.outputs.model_exists == 'true'
        env:
          TOKEN: ${{ secrets.ASSISTANT_REPO_TOKEN }}
          REPO: ${{ secrets.ASSISTANT_REPO_NAME }}
        run: |
          echo "Cloning assistant-service repo..."
          git clone https://x-access-token:${TOKEN}@github.com/${REPO}.git target_repo

          mkdir -p target_repo/models
          cp models/assistant_intent_model.pkl target_repo/models/

          cd target_repo
          git config user.name "ML Bot"
          git config user.email "ml-bot@example.com"

          git add models/assistant_intent_model.pkl
          git commit -m "🔄 Daily model update"
          git push

          echo "Model pushed successfully."

      # ==========================================
      # 7️⃣ Generate Date (DD-MM-YYYY)
      # ==========================================
      - name: 📅 Generate Date
        id: date_step
        run: |
          TODAY=$(date +"%d-%m-%Y")
          echo "today_date=$TODAY" >> $GITHUB_OUTPUT

      # ==========================================
      # 8️⃣ Send Email Report
      # ==========================================
      - name: 📧 Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🧠 Assistant ML Training Report - ${{ steps.date_step.outputs.today_date }}"
          to: ${{ secrets.MAIL_TO }}
          cc: ${{ secrets.MAIL_CC }}
          from: Assistant ML Bot
          secure: true
          html_body: |
            <h2>🧠 Assistant ML Pipeline Report</h2>

            <table border="1" cellpadding="8" cellspacing="0">
              <tr>
                <th align="left">Execution Date</th>
                <td>${{ steps.date_step.outputs.today_date }}</td>
              </tr>
              <tr>
                <th align="left">Repository</th>
                <td>${{ github.repository }}</td>
              </tr>
              <tr>
                <th align="left">Run ID</th>
                <td>${{ github.run_id }}</td>
              </tr>
              <tr>
                <th align="left">Model File Created</th>
                <td>${{ steps.check_model.outputs.model_exists }}</td>
              </tr>
              <tr>
                <th align="left">Workflow Status</th>
                <td>${{ job.status }}</td>
              </tr>
            </table>

            <br>

            <p>
              🔎 View Full Logs:<br>
              <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                Open GitHub Actions Run
              </a>
            </p>

            <br>
            <p>🚀 Automated ML retraining system is running successfully.</p>
